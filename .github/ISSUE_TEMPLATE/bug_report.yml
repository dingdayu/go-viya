name: Bug report
description: Report a reproducible problem
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Module version or commit SHA.
      placeholder: v0.1.0
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal code or steps to reproduce the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Go version, OS, SAS Viya version, and relevant configuration.
